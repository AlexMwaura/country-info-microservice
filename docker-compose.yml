version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: country-info-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: country_info_db
      MYSQL_USER: countryinfo
      MYSQL_PASSWORD: countryinfo_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - country-info-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: country-info-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: country_info_db
      DB_USERNAME: countryinfo
      DB_PASSWORD: countryinfo_secret
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - country-info-network

volumes:
  mysql_data:
    driver: local

networks:
  country-info-network:
    driver: bridge
